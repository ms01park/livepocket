<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>로그인 — Live Pocket V2.7</title>
  <link rel="stylesheet" href="/assets/styles.css?v=2.7.0">
</head>
<body data-page="login">
  <header id="header"></header>
  <main class="auth-page">
    <section class="auth-copy"><a class="brand light" href="/"><b>LP</b><strong>Live Pocket</strong><em>V2.7</em></a><span class="kicker">WELCOME BACK</span><h1>공연의 설렘을<br>계속 이어가세요.</h1><p>일반 회원은 예매와 공연 등록을 같은 계정으로 이용할 수 있습니다.</p></section>
    <section class="auth-card">
      <div id="member-auth"><span class="kicker">ACCOUNT ACCESS</span><h2>이메일로 로그인하기</h2><p>일반 회원 계정으로 공연 예매와 공연 등록을 이용합니다.</p>
        <div class="auth-tabs" role="tablist" aria-label="회원 인증"><button class="active" type="button" role="tab" aria-selected="true" data-auth-tab="login">로그인</button><button type="button" role="tab" aria-selected="false" data-auth-tab="signup">회원가입</button></div>
        <form id="member-login" class="stack" data-auth-panel="login"><label>이메일<input type="email" name="email" autocomplete="username" required></label><label>비밀번호<input type="password" name="password" autocomplete="current-password" required></label><button class="btn primary" type="submit">로그인</button></form>
        <form id="member-signup" class="stack hidden" data-auth-panel="signup"><label>이메일<input type="email" name="email" autocomplete="email" required></label><label>비밀번호<input type="password" name="password" autocomplete="new-password" minlength="8" pattern="(?=.*[A-Za-z])(?=.*[0-9]).{8,}" required><small>8자 이상, 영문과 숫자를 함께 입력해 주세요.</small></label><label>닉네임<input type="text" name="nickname" autocomplete="nickname" maxlength="30" required><small>비속어와 코드 형태의 문자열은 사용할 수 없습니다.</small></label><button class="btn primary" type="submit">회원가입</button></form>
        <p class="auth-note">예매자 정보는 예매 단계에서 입력합니다.</p>
      </div>
      <div id="auth-error" class="alert error hidden"></div>
    </section>
  </main>
  <script src="/assets/app.js?v=2.7.0"></script>
</body>
</html>
